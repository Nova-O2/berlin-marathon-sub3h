abstract: |
  Objectives: To determine whether pacing execution, independent of aerobic fitness, distinguishes runners who achieve a sub-3-hour marathon from those who fail, and to identify actionable pacing thresholds for coaching and race strategy.
  Methods: We analyzed 834,168 finishers from the Berlin Marathon (1999–2025) and employed a quasi-experimental "Golden Window" design that matched runners on half-marathon split time. The Success Group (n=7,710) finished in 2:58:00–2:59:59, while the Failure Group (n=1,875) passed the half-marathon at the same pace but finished >3:05:00. Pacing behavior was characterized using segment paces, coefficient of variation (CV), K-Means clustering, logistic regression, and Random Forest classification.
  Results: Despite near-identical half-marathon times (1:28:05 vs 1:28:08), the Failure Group exhibited 3.8 times greater pacing variability (CV: 11.52% vs 3.02%, p<0.001). Failure runners started faster in the first 15 km but experienced progressive collapse after 30 km (effect size r=0.966 at 35–40 km). K-Means clustering (k=2, validated by silhouette analysis) identified two archetypes: "Positive Split/Fade" (98.3% success rate) and "Metabolic Crash" (71.3% failure rate; χ²=5,614, p<0.001). Pacing CV alone predicted failure with AUC=0.965; the optimal threshold of 5.65% achieved 99.0% sensitivity and 88.0% specificity.
  Conclusion: Among runners with equivalent half-marathon fitness, pacing discipline—not aerobic capacity—is the dominant determinant of sub-3-hour success. The CV threshold of 5.65% offers a practical, data-driven tool for real-time pacing guidance.
